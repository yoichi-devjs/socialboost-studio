<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Binka SocialBoost Studio</title>
        <!-- attaching the style file from its folder -->
        <link rel="stylesheet" href="css/main.css">
    </head>
    <body>
        <!-- This is
             - Landing page
             - Home page
             - Marketing page
             -->

             <!-- Implemting the header -->
             <header>
                <!-- Possible logo section and its related img -->
                 <div id="logo">⚡ SocialBoost Studio</div>
                <!-- Navbar links -->
                 <nav>
                    <!-- about section/link explaining why deciding to help -->
                    <a href="#about">About</a>
                    <!-- contact section/link this will mainly bring out/show my email -->
                    <a href="#contact">Contact</a>
                 </nav>
            </header>

            <!-- Separating the primary content "main" from
             top navigation/branding "header"
             and from the ending content "footer" -->
            <main>
                <!-- creating a container that once in the style file,
                helps "contian" the side spaces of the page -->
                <div class="container">
                    <!-- creation of the hero section -->
                     <section id="hero">
                        
                        <!-- Dividing the page into 2 parts: left and right 
                         eache with its own functionality and purposes 
                         - starting with the left side -->
                        <div class="left-side">
                            <!-- HERO 
                            main message -->
                            <h1>Generate Product Descriptions & Social Captions in Seconds!</h1>
                            <!-- Here the description -->
                            <p>Create professional product descriptions and social captions faster while eliminating writer’s block and saving valuable time for your business.</p>

                            <!-- CTA section 
                            giving an "id" to my button for better styling later on -->
                            <button id="begin">Try it Free</button>
                        </div>

                        <!-- creating the right side container -->
                        <div class="right-side">
                            <!-- Demos/images -->

                            <!-- The right side must simulate a mini SaaS Tool 
                            that will contain 3 parts
                            - user idea as input area
                            - a "generate" button
                            - result description as output area -->

                            <!-- Tool title -->
                            <h2>Product Description Generator</h2>
                            <!-- User Input -->
                            <textarea name="Description" id="product-gen" placeholder="Describe your Product..."></textarea>
                            <!-- CTA -->
                            <button id="generate">Generate</button>
                            <!-- Output container -->
                            <div id="output">
                                <!-- Implementing an empty element for the future generated title -->
                                <h3 id="output-title"></h3>
                                <!-- Implementing a paragraph for the generated description -->
                                <p id="output-text"></p>
                            </div>

                        </div>

                    </section>

                
                    <!-- Feature explaining what it does -->
                    <section id="features">
                        <!-- to be added -->
                    </section>
                    <!-- Demos showcasing what it looks like -->
                    <section id="demos">
                        <!-- to be added -->
                    </section>
                    <!-- Testimonials is for the trust building -->
                    <section id="testimonials">
                        <!-- to be added -->
                    </section>
                    <!-- Pricing "zone" -->
                    <section id="pricing">
                        <!-- to be added -->
                    </section>
                
                </div>

            </main>


            <!-- Footer -->
             <footer>
                <!-- Footer content (to be added) -->
             </footer>

             <!-- adding every and each JS file that works with this sturcture -->
             <script src="js/templates.js"></script>
             <!-- template.js responsible for "incubating" the function that returns the "chosen sentences" -->
             <script src="js/generators.js"></script>
             <!-- generators.js responsible for the container where random sentences gets "picked" from -->
             <script src="js/ui.js"></script>
             <!-- ui.js responsible for the UI interaction part, creating the AI-LIKE logic -->
             <script src="js/app.js"></script>
             <!-- app.js for the moment is still an empty file -->
    </body>
</html>
